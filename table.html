<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טבלה מחזורית מלאה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 1rem;
        }

        /* Periodic Table Grid - Force LTR for the elements layout */
        .periodic-wrapper {
            direction: ltr; 
            display: grid;
            grid-template-columns: repeat(18, minmax(0, 1fr));
            grid-template-rows: repeat(10, minmax(0, 1fr));
            gap: 4px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .element-card {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            padding: 2px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .element-card:hover {
            transform: scale(1.3);
            z-index: 50;
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }

        .atomic-number {
            font-size: 0.6rem;
            position: absolute;
            top: 1px;
            left: 3px;
        }

        .symbol {
            font-weight: 800;
            font-size: 1.1rem;
            line-height: 1;
        }

        .name {
            font-size: 0.5rem;
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            max-width: 90%;
        }

        /* Categories */
        .diatomic-nonmetal { background-color: #00ff88; color: #000; }
        .noble-gas { background-color: #c084fc; color: #000; }
        .alkali-metal { background-color: #f87171; color: #000; }
        .alkaline-earth-metal { background-color: #fb923c; color: #000; }
        .metalloid { background-color: #2dd4bf; color: #000; }
        .polyatomic-nonmetal { background-color: #4ade80; color: #000; }
        .post-transition-metal { background-color: #94a3b8; color: #000; }
        .transition-metal { background-color: #facc15; color: #000; }
        .lanthanide { background-color: #ff99cc; color: #000; }
        .actinide { background-color: #f472b6; color: #000; }
        .unknown { background-color: #475569; color: #fff; }

        /* Modal */
        #info-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            z-index: 100;
            width: 90%;
            max-width: 400px;
            border: 1px solid #334155;
            direction: rtl;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 90;
        }

        .spacer { height: 20px; grid-column: span 18; }
    </style>
</head>

            <p><strong>קטגוריה:</strong> <span id="m-cat"></span></p>

        const container = document.getElementById('table-container');

        function initTable() {
            // Standard layout is 7 regular rows + 2 rows for lanthanides/actinides
            const totalSlots = 10 * 18;
            const grid = new Array(totalSlots).fill(null);

            elementsData.forEach(el => {
                const idx = (el.r - 1) * 18 + (el.c - 1);
                grid[idx] = el;
            });

            grid.forEach((el, i) => {
                const cell = document.createElement('div');
                
                // Add separator row before Lanthanides/Actinides
                if (i === 7 * 18) {
                   const spacer = document.createElement('div');
                   spacer.className = 'spacer';
                   container.appendChild(spacer);
                }

                if (el) {
                    cell.className = `element-card ${el.cat}`;
                    cell.innerHTML = `
                        <div class="atomic-number">${el.n}</div>
                        <div class="symbol">${el.s}</div>
                        <div class="name">${el.name}</div>
                    `;
                    cell.onclick = () => openModal(el);
                } else {
                    cell.className = 'empty-cell';
                }
                container.appendChild(cell);
            });
        }

        function openModal(el) {
            document.getElementById('m-name').innerText = el.name;
            document.getElementById('m-symbol').innerText = el.s;
            document.getElementById('m-num').innerText = el.n;
            document.getElementById('m-mass').innerText = el.m;
            document.getElementById('m-cat').innerText = el.cat.replace(/-/g, ' ');
            
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('info-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('info-modal').style.display = 'none';
        }

        initTable();
