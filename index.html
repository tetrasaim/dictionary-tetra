<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tetralingua — מילון השפה</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Serif+Hebrew:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a10;
    --surface: #0d1520;
    --border: #1e3a5f;
    --accent1: #00d4ff;
    --text: #c8dff5;
    --text-dim: #5a7a99;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif Hebrew', serif;
    min-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
    scrollbar-width: none; /* Firefox */
  }
  body::-webkit-scrollbar {
    display: none; /* Chrome, Safari, Edge */
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; top: -20%; left: 50%;
    transform: translateX(-50%);
    width: 900px; height: 900px;
    background: radial-gradient(ellipse, rgba(0,212,255,0.05) 0%, transparent 68%);
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto; padding: 2rem;
  }

  /* HEADER */
  header { text-align: center; padding: 4rem 0 3rem; }

  .logo-symbol {
    font-family: 'Orbitron', monospace;
    font-size: 0.72rem; letter-spacing: 0.5em;
    color: var(--accent1); opacity: 0.55; margin-bottom: 1rem;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:.7} }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(3rem, 8vw, 6rem); font-weight: 900;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, #00d4ff 0%, #0055ff 50%, #00d4ff 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; background-size: 200%;
    animation: shimmer 5s linear infinite;
    line-height: 1; margin-bottom: 0.5rem;
  }
  @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.88rem; color: var(--text-dim);
    letter-spacing: 0.2em; margin-top: 0.75rem;
  }

  .version-tag {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem; color: var(--accent1);
    border: 1px solid rgba(0,212,255,0.3);
    padding: 0.2rem 0.6rem; border-radius: 3px;
    margin-top: 0.6rem; letter-spacing: 0.12em;
    opacity: 0.7;
  }

  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent1), transparent);
    opacity: 0.3; margin: 2.5rem 0;
  }

  /* CONTROLS ROW */
  .controls-row {
    display: flex; gap: 1rem; align-items: center;
    justify-content: center; margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  /* SEARCH */
  .search-box { position: relative; flex: 1; max-width: 400px; min-width: 200px; }

  .search-box input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.85rem 1.25rem 0.85rem 3rem;
    color: var(--text); font-family: 'Share Tech Mono', monospace;
    font-size: 1rem; outline: none; direction: rtl;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-box input:focus {
    border-color: var(--accent1);
    box-shadow: 0 0 22px rgba(0,212,255,0.13);
  }
  .search-icon {
    position: absolute; left: 1rem; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim); font-size: 1.1rem; pointer-events: none;
  }

  /* SORT SELECTOR */
  .sort-select-wrap {
    position: relative; flex-shrink: 0;
  }
  .sort-select-wrap select {
    appearance: none;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.85rem 2.2rem 0.85rem 1rem;
    color: var(--accent1); font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem; outline: none; cursor: pointer;
    transition: border-color 0.25s;
    min-width: 160px;
  }
  .sort-select-wrap select:focus { border-color: var(--accent1); }
  .sort-select-wrap::after {
    content: '▾'; position: absolute; left: 0.7rem; top: 50%;
    transform: translateY(-50%); color: var(--accent1);
    pointer-events: none; font-size: 0.8rem;
  }

  /* LANGUAGE SELECTOR */
  .lang-select-wrap {
    position: relative; flex-shrink: 0;
  }
  .lang-select-wrap select {
    appearance: none;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.85rem 2.2rem 0.85rem 1rem;
    color: var(--accent1); font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem; outline: none; cursor: pointer;
    transition: border-color 0.25s;
    min-width: 170px;
  }
  .lang-select-wrap select:focus { border-color: var(--accent1); }
  .lang-select-wrap::after {
    content: '▾'; position: absolute; left: 0.7rem; top: 50%;
    transform: translateY(-50%); color: var(--accent1);
    pointer-events: none; font-size: 0.8rem;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex; flex-wrap: wrap;
    gap: 0.55rem; justify-content: center; margin-bottom: 2.5rem;
  }
  .filter-btn {
    font-family: 'Share Tech Mono', monospace; font-size: 0.75rem;
    padding: 0.38rem 0.95rem; border-radius: 3px; border: 1px solid;
    cursor: pointer; background: transparent;
    transition: background 0.18s, color 0.18s; letter-spacing: 0.04em;
  }

  /* STATS */
  .stats {
    text-align: center; font-family: 'Share Tech Mono', monospace;
    font-size: 0.76rem; color: var(--text-dim);
    margin-bottom: 1.5rem; letter-spacing: 0.05em;
  }
  .stats span { color: var(--accent1); font-weight: 700; }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 1rem;
  }

  /* CARD */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-right-width: 3px; border-radius: 6px;
    padding: 1rem 1.1rem; display: flex;
    flex-direction: column; gap: 0.3rem;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    cursor: default;
  }
  .card:hover { transform: translateY(-3px); }

  .card-tetralingua {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.12rem; font-weight: 700;
    letter-spacing: 0.03em; line-height: 1.2;
  }
  .card-primary { font-size: 1.05rem; color: var(--text); }
  .card-english {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem; color: var(--text-dim); letter-spacing: 0.05em;
  }
  .card-pronunciation {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem; color: var(--accent1); opacity: 0.55;
    letter-spacing: 0.05em;
  }
  .card-type {
    font-family: 'Share Tech Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim);
  }
  .card-category {
    font-family: 'Share Tech Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.1em; opacity: 0.55;
  }
  .card-extra-langs {
    font-size: 0.68rem; color: var(--text-dim); line-height: 1.6;
    border-top: 1px solid var(--border); padding-top: 0.4rem; margin-top: 0.2rem;
  }
  .card-extra-langs .lang-pill {
    display: inline-block; margin-left: 0.3rem; margin-bottom: 0.15rem;
  }
  .card-extra-langs .lang-code {
    color: var(--accent1); font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem; opacity: 0.7;
  }

  /* EXPANDED CARD (modal) */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(6,10,16,0.88); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 2rem; max-width: 680px; width: 90%;
    max-height: 80vh; overflow-y: auto;
    position: relative;
    box-shadow: 0 0 60px rgba(0,212,255,0.1);
  }
  .modal-close {
    position: absolute; top: 1rem; left: 1rem;
    background: none; border: none; color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace; font-size: 0.8rem;
    cursor: pointer; letter-spacing: 0.1em;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--accent1); }
  .modal-title {
    font-family: 'Orbitron', monospace; font-size: 2rem;
    font-weight: 900; margin-bottom: 0.3rem;
  }
  .modal-english {
    font-family: 'Share Tech Mono', monospace; color: var(--text-dim);
    font-size: 0.85rem; margin-bottom: 0.5rem; letter-spacing: 0.1em;
  }
  .modal-badges { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .modal-badge {
    font-family: 'Share Tech Mono', monospace; font-size: 0.62rem;
    padding: 0.2rem 0.6rem; border-radius: 3px; border: 1px solid;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .modal-langs-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.5rem;
  }
  .modal-lang-item {
    background: rgba(0,212,255,0.03); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.5rem 0.75rem;
    display: flex; flex-direction: column; gap: 0.1rem;
  }
  .modal-lang-code {
    font-family: 'Share Tech Mono', monospace; font-size: 0.58rem;
    color: var(--accent1); opacity: 0.6; letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .modal-lang-name { font-size: 0.7rem; color: var(--text-dim); }
  .modal-lang-value { font-size: 0.95rem; color: var(--text); }

  .modal-meta-row {
    display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center;
    margin-bottom: 0.9rem;
  }
  .modal-why {
    font-family: 'Share Tech Mono', monospace; font-size: 0.78rem;
    color: var(--text-dim); background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.15); border-radius: 4px;
    padding: 0.3rem 0.7rem; letter-spacing: 0.03em;
  }
  .modal-why .why-label { color: var(--accent1); margin-left: 0.35rem; opacity: 0.7; font-size: 0.68rem; }
  .modal-abbreviation {
    font-family: 'Share Tech Mono', monospace; font-size: 0.78rem;
    color: var(--accent1); background: rgba(0,212,255,0.07);
    border: 1px solid rgba(0,212,255,0.25); border-radius: 4px;
    padding: 0.3rem 0.7rem; letter-spacing: 0.08em;
  }
  .modal-abbreviation .abbr-label { color: var(--text-dim); margin-left: 0.35rem; opacity: 0.7; font-size: 0.68rem; }
  .modal-speak-btn {
    background: none; border: 1px solid rgba(0,212,255,0.35);
    border-radius: 4px; padding: 0.3rem 0.75rem;
    color: var(--accent1); font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem; cursor: pointer; letter-spacing: 0.08em;
    transition: background 0.18s, box-shadow 0.18s;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .modal-speak-btn:hover {
    background: rgba(0,212,255,0.1);
    box-shadow: 0 0 12px rgba(0,212,255,0.15);
  }
  .card-speak-btn {
    background: none; border: none; padding: 0;
    color: var(--accent1); opacity: 0.5; font-size: 0.75rem;
    cursor: pointer; line-height: 1;
    transition: opacity 0.15s;
    display: inline-block; vertical-align: middle; margin-right: 0.3rem;
  }
  .card-speak-btn:hover { opacity: 1; }

  /* NO RESULTS */
  #no-results {
    display: none; grid-column: 1 / -1; text-align: center;
    color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem; padding: 3rem;
  }

  /* LEGEND */
  .legend {
    display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center;
    margin-top: 4rem; padding: 1.5rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 0.5rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.74rem; color: var(--text-dim);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* LOADER */
  #loader {
    grid-column: 1 / -1; text-align: center; padding: 5rem;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text-dim); letter-spacing: 0.2em; font-size: 0.85rem;
    animation: pulse 1.5s ease-in-out infinite;
  }

  /* FOOTER & IFRAME */
  footer {
    text-align: center; margin-top: 4rem; padding: 2rem;
    color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.1em;
    border-top: 1px solid var(--border); line-height: 2;
  }

/* התאמה לניידים - בגלל שהטבלה נהיית צרה היא צריכה יותר גובה */
    @media (max-width: 768px) {
      #pt-iframe {
        height: 600px; /* או גובה אחר שמתאים לתצוגת הנייד של האתר ההוא */
        overflow-x: auto; /* מאפשר גלילה לצדדים בנייד במקום למעוך את הטבלה */
      }
    }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-symbol">◈ tetraism Language Project ◈</div>
    <h1>tetralingua</h1>
    <div class="version-tag" id="version-tag">מילון השפה הרשמי</div>
  </header>

  <div class="divider"></div>

  <div class="controls-row">
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" id="search"
             placeholder="חיפוש מילה..." autocomplete="off">
    </div>
    <div class="lang-select-wrap">
      <select id="lang-select">
        <option value="he">עברית</option>
      </select>
    </div>
    <div class="sort-select-wrap">
      <select id="sort-select">
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
        <option value="len-asc">קצר → ארוך</option>
        <option value="len-desc">ארוך → קצר</option>
      </select>
    </div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn" data-cat="all">הכל</button>
  </div>

  <div class="stats" id="stats">טוען נתונים...</div>

  <div class="grid" id="grid">
    <div id="loader">⟳ טוען מילון מ-tetralingua_words.json ...</div>
    <div id="no-results">לא נמצאו תוצאות // No results found</div>
  </div>

  <div class="legend" id="legend"></div>

<div style="width:100%; margin-top:3rem; border:1px solid var(--border); border-radius:12px; overflow:hidden; background:#0b1018;">
    <iframe
      src="table.html"
      id="pt-iframe"
      style="width:100%; height: 800px; border:none; display:block;"
      scrolling="no"
      loading="lazy"
      title="טבלת היסודות המחזורית"
    ></iframe>
  </div>

  <footer>
    tetralingua // שפת הטריזם // מבוססת על הטבלה המחזורית
  </footer>

</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">✕ סגור</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-english" id="modal-english"></div>
    <div class="modal-badges" id="modal-badges"></div>
    <div class="modal-meta-row" id="modal-meta-row"></div>
    <div class="modal-langs-grid" id="modal-langs-grid"></div>
  </div>
</div>

<script>
const JSON_URL = 'tetralingua_words.json';

// ─── CATEGORY CONFIG ──────────────────────────────────────────────────────────
const CAT_CONFIG = {
  nouns:           { label: 'שמות עצם',    color: '#00d4ff' },
  verbs:           { label: 'פעלים',        color: '#00ff9f' },
  adjectives:      { label: 'תארים',        color: '#ff9f00' },
  adverbs:         { label: 'תארי פועל',    color: '#c77dff' },
  connectors:      { label: 'מחברים',       color: '#ff6b6b' },
  questions:       { label: 'שאלות',        color: '#ffd166' },
  greetings:       { label: 'ברכות',        color: '#06d6a0' },
  negation_general:{ label: 'שלילה',        color: '#ef476f' },
  num:{ label: 'מספרים',        color: '#d90429' },
};

const SUBCATEGORY_COLORS = {
  celestial:  '#00d4ff',
  elements:   '#ff9f00',
  nature:     '#00ff9f',
  human:      '#c77dff',
  time:       '#ffd166',
  abstract:   '#ef476f',
  place:      '#06d6a0',
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let allWords      = [];
let languageList  = [];
let activeLang    = 'he';
let activeFilter  = 'all';
let activeSort    = 'az';

// ─── LOAD DATA ────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(JSON_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    languageList = data.language_list || [];
    const vocab = data.core_vocabulary_multilingual_complete || {};
    allWords = [];
    Object.entries(vocab).forEach(([gramCat, items]) => {
      if (gramCat === 'description' || !Array.isArray(items)) return;
      items.forEach(w => {
        allWords.push({
          tetralingua:   w.tetralingua || '',
          english:       w.english || '',
          gramCat:       gramCat,
          subCat:        w.category || '',
          translations:  w.translations || {},
          why:           w.why || '',
          abbreviation:  w.abbreviation || '',
          pronunciation: w.Pronunciation || '',
        });
      });
    });

    if (data.meta?.version) {
      document.getElementById('version-tag').textContent = `v${data.meta.version}`;
    }

    document.getElementById('loader').remove();
    buildLangSelect();
    buildSortSelect();
    buildFilterBar();
    buildLegend();
    render();
  } catch (err) {
    const loader = document.getElementById('loader');
    if(loader) loader.textContent = `⚠ שגיאה: ${err.message}`;
    console.error(err);
  }
}

function buildLangSelect() {
  const sel = document.getElementById('lang-select');
  sel.innerHTML = '';
  languageList.forEach(lang => {
    const opt = document.createElement('option');
    opt.value = lang.code;
    opt.textContent = `${lang.native_name} (${lang.code})`;
    if (lang.code === 'he') opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    activeLang = sel.value;
    const rtlLangs = ['he', 'ar'];
    document.getElementById('search').dir = rtlLangs.includes(activeLang) ? 'rtl' : 'ltr';
    render();
  });
}

function buildSortSelect() {
  const sel = document.getElementById('sort-select');
  sel.addEventListener('change', () => {
    activeSort = sel.value;
    render();
  });
}

function getSortedWords(words) {
  const arr = [...words];
  switch (activeSort) {
    case 'az': return arr.sort((a, b) => a.tetralingua.toLowerCase().localeCompare(b.tetralingua.toLowerCase()));
    case 'za': return arr.sort((a, b) => b.tetralingua.toLowerCase().localeCompare(a.tetralingua.toLowerCase()));
    case 'len-asc': return arr.sort((a, b) => a.tetralingua.length - b.tetralingua.length || a.tetralingua.localeCompare(b.tetralingua));
    case 'len-desc': return arr.sort((a, b) => b.tetralingua.length - a.tetralingua.length || a.tetralingua.localeCompare(b.tetralingua));
    default: return arr;
  }
}

function buildFilterBar() {
  const bar = document.getElementById('filter-bar');
  const DIM = '#5a7a99';
  const allBtn = bar.querySelector('[data-cat="all"]');
  styleBtn(allBtn, DIM, true);

  Object.entries(CAT_CONFIG).forEach(([key, cat]) => {
    if (!allWords.some(w => w.gramCat === key)) return;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.cat = key;
    btn.textContent = cat.label;
    styleBtn(btn, cat.color, false);
    bar.appendChild(btn);
  });

  bar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    bar.querySelectorAll('.filter-btn').forEach(b => {
      const c = b.dataset.cat === 'all' ? DIM : (CAT_CONFIG[b.dataset.cat]?.color ?? DIM);
      styleBtn(b, c, false);
    });
    activeFilter = btn.dataset.cat;
    const col = activeFilter === 'all' ? DIM : (CAT_CONFIG[activeFilter]?.color ?? DIM);
    styleBtn(btn, col, true);
    render();
  });
}

function styleBtn(btn, color, active) {
  btn.style.borderColor = color;
  if (active) {
    btn.style.background = color;
    btn.style.color = '#060a10';
  } else {
    btn.style.background = 'transparent';
    btn.style.color = color;
  }
}

function buildLegend() {
  const legend = document.getElementById('legend');
  Object.entries(CAT_CONFIG).forEach(([key, cat]) => {
    if (!allWords.some(w => w.gramCat === key)) return;
    legend.insertAdjacentHTML('beforeend', `
      <div class="legend-item">
        <div class="legend-dot" style="background:${cat.color}"></div>
        ${cat.label}
      </div>`);
  });
}

function render() {
  const query  = document.getElementById('search').value.trim().toLowerCase();
  const grid   = document.getElementById('grid');
  const noRes  = document.getElementById('no-results');
  const stats  = document.getElementById('stats');

  grid.querySelectorAll('.card').forEach(c => c.remove());

  const filtered = allWords.filter(w => {
    const matchCat = activeFilter === 'all' || w.gramCat === activeFilter;
    const primaryTrans = (w.translations[activeLang] || '').toLowerCase();
    const matchQ = !query
      || w.tetralingua.toLowerCase().includes(query)
      || primaryTrans.includes(query)
      || w.english.toLowerCase().includes(query);
    return matchCat && matchQ;
  });

  noRes.style.display = filtered.length === 0 ? 'block' : 'none';
  const langInfo = languageList.find(l => l.code === activeLang);
  const langName = langInfo ? langInfo.native_name : activeLang;
  stats.innerHTML = `מציג <span>${filtered.length}</span> / ${allWords.length} מילים &nbsp;·&nbsp; שפה: <span>${langName}</span>`;

  const sorted = getSortedWords(filtered);
  sorted.forEach(w => {
    const cat   = CAT_CONFIG[w.gramCat] ?? { color: '#5a7a99', label: w.gramCat };
    const color = w.subCat && SUBCATEGORY_COLORS[w.subCat] ? SUBCATEGORY_COLORS[w.subCat] : cat.color;
    const primaryTrans = w.translations[activeLang] || '—';

    const previewLangs = languageList
      .filter(l => l.code !== activeLang && (l.code !== 'he' || activeLang !== 'he'))
      .filter(l => l.code !== activeLang)
      .slice(0, 3);

    const card = document.createElement('div');
    card.className = 'card';
    card.style.borderRightColor = color;

    const extraHtml = previewLangs.map(l => {
      const val = w.translations[l.code];
      if (!val) return '';
      return `<span class="lang-pill"><span class="lang-code">${l.code}</span> ${val}</span>`;
    }).join(' ');

    card.innerHTML = `
      <div class="card-tetralingua" style="color:${color}">${w.tetralingua}</div>
      ${w.pronunciation ? `<div class="card-pronunciation">/${w.pronunciation}/</div>` : ''}
      <div class="card-primary">${primaryTrans}</div>
      ${activeLang !== 'en' ? `<div class="card-english">${w.english}</div>` : ''}
      <div class="card-type">${cat.label}${w.subCat ? ' · ' + w.subCat : ''}</div>
      ${extraHtml ? `<div class="card-extra-langs">${extraHtml}</div>` : ''}`;

    // כפתור הקראה בכרטיס
    const speakText = w.pronunciation || w.tetralingua;
    const cardSpeakBtn = document.createElement('button');
    cardSpeakBtn.className = 'card-speak-btn';
    cardSpeakBtn.title = `הקראה: ${speakText}`;
    cardSpeakBtn.textContent = '▶';
    cardSpeakBtn.addEventListener('click', e => {
      e.stopPropagation();
      const utt = new SpeechSynthesisUtterance(speakText);
      utt.lang = 'en-US';
      speechSynthesis.cancel();
      speechSynthesis.speak(utt);
    });
    card.querySelector('.card-tetralingua').prepend(cardSpeakBtn);

    card.addEventListener('mouseenter', () => {
      card.style.borderColor = color;
      card.style.boxShadow   = `0 8px 30px ${color}25`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.borderColor      = '#1e3a5f';
      card.style.borderRightColor = color;
      card.style.boxShadow        = 'none';
    });
    card.addEventListener('click', () => openModal(w, color));
    grid.appendChild(card);
  });
}

function openModal(w, color) {
  const cat = CAT_CONFIG[w.gramCat] ?? { color: '#5a7a99', label: w.gramCat };
  document.getElementById('modal-title').textContent = w.tetralingua;
  document.getElementById('modal-title').style.color = color;
  document.getElementById('modal-english').textContent = w.english;

  const badges = document.getElementById('modal-badges');
  badges.innerHTML = `
    <span class="modal-badge" style="border-color:${cat.color};color:${cat.color}">${cat.label}</span>
    ${w.subCat ? `<span class="modal-badge" style="border-color:${color};color:${color}">${w.subCat}</span>` : ''}
  `;

  const langsGrid = document.getElementById('modal-langs-grid');
  langsGrid.innerHTML = languageList.map(l => {
    const val = w.translations[l.code];
    if (!val) return '';
    return `
      <div class="modal-lang-item">
        <div class="modal-lang-code">${l.code}</div>
        <div class="modal-lang-name">${l.native_name}</div>
        <div class="modal-lang-value">${val}</div>
      </div>`;
  }).join('');

  // meta row: speak button, abbreviation, why
  const metaRow = document.getElementById('modal-meta-row');
  metaRow.innerHTML = '';

  const speakText = w.pronunciation || w.tetralingua;
  const speakBtn = document.createElement('button');
  speakBtn.className = 'modal-speak-btn';
  speakBtn.innerHTML = '▶ הקראה';
  speakBtn.addEventListener('click', () => {
    const utt = new SpeechSynthesisUtterance(speakText);
    utt.lang = 'en-US';
    speechSynthesis.cancel();
    speechSynthesis.speak(utt);
  });
  metaRow.appendChild(speakBtn);

  if (w.abbreviation) {
    const abbr = document.createElement('div');
    abbr.className = 'modal-abbreviation';
    abbr.innerHTML = `<span class="abbr-label">קיצור</span>${w.abbreviation}`;
    metaRow.appendChild(abbr);
  }

  if (w.why) {
    const why = document.createElement('div');
    why.className = 'modal-why';
    why.innerHTML = `<span class="why-label">מדוע</span>${w.why}`;
    metaRow.appendChild(why);
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('search').addEventListener('input', render);

loadData();
</script>
</body>
</html>
